version: '3.8'

# Development stack — all 9 backend services + frontend run with hot-reload.
# Services without a dedicated Dockerfile.dev use the node:18-alpine image
# directly with a volume-mounted src/ directory and nodemon for hot-reload.
# node_modules are isolated per-service via named volumes to avoid
# host/container platform mismatches.

services:
  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: wine_tastings_dev
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_pass
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./backend/database/seeds:/docker-entrypoint-initdb.d/seeds/
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d wine_tastings_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wine-dev-network

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wine-dev-network

  # ── Backend Services (hot-reload via nodemon) ───────────────────────────────
  # Each service mounts its src/ directory so code changes are picked up
  # instantly. node_modules live in named volumes (not bind-mounted) to
  # avoid native-module conflicts between host OS and alpine container.

  api-gateway:
    build:
      context: ./backend/services/api-gateway
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./backend/services/api-gateway/src:/app/src
    environment:
      - NODE_ENV=development
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev-secret-for-local
      - ALLOWED_ORIGINS=http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wine-dev-network

  auth-service:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && npx nodemon src/server.js"
    ports:
      - "3001:3001"
    volumes:
      - ./backend/services/auth-service:/app
      - auth_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=postgresql://dev_user:dev_pass@postgres:5432/wine_tastings_dev
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev-secret-for-local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wine-dev-network

  tenant-service:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && npx nodemon src/server.js"
    ports:
      - "3002:3002"
    volumes:
      - ./backend/services/tenant-service:/app
      - tenant_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3002
      - DATABASE_URL=postgresql://dev_user:dev_pass@postgres:5432/wine_tastings_dev
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wine-dev-network

  tasting-service:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && npx nodemon src/server.js"
    ports:
      - "3003:3003"
    volumes:
      - ./backend/services/tasting-service:/app
      - tasting_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3003
      - DATABASE_URL=postgresql://dev_user:dev_pass@postgres:5432/wine_tastings_dev
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wine-dev-network

  booking-service:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && npx nodemon src/server.js"
    ports:
      - "3004:3004"
    volumes:
      - ./backend/services/booking-service:/app
      - booking_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3004
      - DATABASE_URL=postgresql://dev_user:dev_pass@postgres:5432/wine_tastings_dev
      - JWT_SECRET=dev-secret-for-local
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wine-dev-network

  payment-service:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && npx nodemon src/server.js"
    ports:
      - "3005:3005"
    volumes:
      - ./backend/services/payment-service:/app
      - payment_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3005
      - DATABASE_URL=postgresql://dev_user:dev_pass@postgres:5432/wine_tastings_dev
      - JWT_SECRET=dev-secret-for-local
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wine-dev-network

  notification-service:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && npx nodemon src/server.js"
    ports:
      - "3006:3006"
    volumes:
      - ./backend/services/notification-service:/app
      - notification_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3006
      - DATABASE_URL=postgresql://dev_user:dev_pass@postgres:5432/wine_tastings_dev
      # SMTP_* intentionally omitted in dev — notifications are queued only
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wine-dev-network

  analytics-service:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && npx nodemon src/server.js"
    ports:
      - "3007:3007"
    volumes:
      - ./backend/services/analytics-service:/app
      - analytics_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3007
      - DATABASE_URL=postgresql://dev_user:dev_pass@postgres:5432/wine_tastings_dev
      - JWT_SECRET=dev-secret-for-local
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wine-dev-network

  file-service:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install && npx nodemon src/server.js"
    ports:
      - "3008:3008"
    volumes:
      - ./backend/services/file-service:/app
      - file_node_modules:/app/node_modules
      - uploads_dev_data:/uploads
    environment:
      - NODE_ENV=development
      - PORT=3008
      - DATABASE_URL=postgresql://dev_user:dev_pass@postgres:5432/wine_tastings_dev
      - JWT_SECRET=dev-secret-for-local
      - FILE_STORAGE_PATH=/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - wine-dev-network

  # ── Frontend (Vite HMR) ─────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - api-gateway
    networks:
      - wine-dev-network

volumes:
  postgres_dev_data:
  uploads_dev_data:
  auth_node_modules:
  tenant_node_modules:
  tasting_node_modules:
  booking_node_modules:
  payment_node_modules:
  notification_node_modules:
  analytics_node_modules:
  file_node_modules:

networks:
  wine-dev-network:
    driver: bridge
