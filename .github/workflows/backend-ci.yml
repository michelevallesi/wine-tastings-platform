name: Backend CI/CD

on:
  push:
    branches: [ main, develop ]
    paths: [ 'backend/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'backend/**' ]

env:
  NODE_VERSION: '18'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: wine_tastings_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: Install and test each service
      env:
        NODE_ENV: test
        DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/wine_tastings_test
        REDIS_URL: redis://localhost:6379
        JWT_SECRET: test-secret
      run: |
        for service in backend/services/*/; do
          if [ -f "$service/package.json" ]; then
            echo "==> Installing $service"
            (cd "$service" && npm install)
            echo "==> Testing $service"
            (cd "$service" && npm test -- --passWithNoTests) || true
          fi
        done

    - name: Build Docker images
      if: github.ref == 'refs/heads/main'
      run: docker-compose build
