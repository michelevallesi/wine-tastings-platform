events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/xml+rss
        application/javascript
        application/json;

    # Redirect HTTP → HTTPS in production. In Docker Compose, TLS is typically
    # terminated at an upstream load balancer; enable this block when nginx
    # handles TLS directly (e.g. with Certbot/Let's Encrypt certificates).
    #
    # server {
    #     listen 80;
    #     server_name wine-tastings.com www.wine-tastings.com;
    #     return 301 https://$host$request_uri;
    # }

    server {
        # Change to "listen 443 ssl http2;" and add ssl_certificate directives
        # when terminating TLS at this nginx instance instead of upstream.
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # Handle client-side routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # API proxy to backend
        location /api/ {
            proxy_pass http://api-gateway:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static assets caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self' https:; frame-ancestors 'none'" always;
        # HSTS: tells browsers to only use HTTPS for 1 year (including subdomains).
        # Safe to set here even when TLS terminates upstream; only active over HTTPS.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }
}
